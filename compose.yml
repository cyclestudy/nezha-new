x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "2"
services:
  dashboard:
    image: ghcr.io/nezhahq/nezha
    restart: always
    volumes:
      - ./data:/dashboard/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8008"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "127.0.0.1:9090:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      dashboard:
        condition: service_healthy
    logging: *default-logging

